<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600">
  <defs>
    <filter id="paper-shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.08"/>
    </filter>
  </defs>

  <!-- Paper sheet -->
  <rect x="40" y="40" width="720" height="520" rx="12" ry="12"
        fill="#ffffff" stroke="#e5e5e5" stroke-width="1"
        filter="url(#paper-shadow)"/>

  <!-- Title -->
  <text x="400" y="90" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="22" font-weight="600" fill="#334155">
    Dashboard Layout
  </text>

  <!-- Left column -->
  <!-- Portfolio box -->
  <rect x="80" y="120" width="420" height="260" rx="8" ry="8"
        fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="290" y="155" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="14" font-weight="600" fill="#94a3b8" letter-spacing="0.1em">
    MAIN PORTFOLIO
  </text>

  <!-- Debt box -->
  <rect x="80" y="410" width="420" height="120" rx="8" ry="8"
        fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="290" y="445" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="14" font-weight="600" fill="#94a3b8" letter-spacing="0.1em">
    DEBT GRAPHS
  </text>

  <!-- Right column -->
  <!-- Memory box -->
  <rect x="540" y="120" width="220" height="220" rx="8" ry="8"
        fill="none" stroke="#94a3b8" stroke-width="2" stroke-dasharray="8 6"/>
  <text x="650" y="155" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" font-weight="600" fill="#94a3b8" letter-spacing="0.1em">
    CHAT MEMORY PREVIEW
  </text>

  <!-- Agent chat label -->
  <text x="650" y="380" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="11" font-weight="600" fill="#cbd5e1" letter-spacing="0.1em">
    AGENT CHAT
  </text>

  <!-- Agent buttons -->
  <rect x="540" y="400" width="220" height="40" rx="6" ry="6"
        fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="650" y="425" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" font-weight="500" fill="#94a3b8">
    Portfolio Agent
  </text>

  <rect x="540" y="450" width="220" height="40" rx="6" ry="6"
        fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="650" y="475" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" font-weight="500" fill="#94a3b8">
    Debt Agent
  </text>

  <rect x="540" y="500" width="220" height="40" rx="6" ry="6"
        fill="none" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="6 4"/>
  <text x="650" y="525" text-anchor="middle" font-family="ui-sans-serif, system-ui, sans-serif"
        font-size="12" font-weight="500" fill="#94a3b8">
    Retirement Agent
  </text>
</svg>
