<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 600" width="900" height="600">
  <defs>
    <linearGradient id="skyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#E8F7FC"/>
      <stop offset="100%" stop-color="#C9E9F6"/>
    </linearGradient>
    <linearGradient id="oceanGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#87CEEB"/>
      <stop offset="100%" stop-color="#4A9FD4"/>
    </linearGradient>
    <linearGradient id="waveBody" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#5FB8E0"/>
      <stop offset="100%" stop-color="#3A8CC8"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <style>
      .wave-fore { animation: waveMove 8s linear infinite; }
      .wave-mid { animation: waveMove 12s linear infinite; }
      .wave-back { animation: waveMove 16s linear infinite; }
      .fin { animation: bob 3s ease-in-out infinite; }
      .foam { animation: foamPulse 4s ease-in-out infinite; }
      @keyframes waveMove {
        0% { transform: translateX(0); }
        100% { transform: translateX(-100px); }
      }
      @keyframes bob {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-8px); }
      }
      @keyframes foamPulse {
        0%, 100% { opacity: 0.6; }
        50% { opacity: 1; }
      }
    </style>
  </defs>

  <!-- Sky -->
  <rect width="900" height="600" fill="url(#skyGrad)"/>

  <!-- Clouds -->
  <g fill="#FFFFFF" opacity="0.9">
    <path d="M120 80 Q140 50 170 70 Q200 50 220 80 Q240 90 220 110 L140 110 Q110 110 120 80 Z"/>
    <path d="M520 60 Q540 30 570 50 Q600 30 620 60 Q640 70 620 90 L540 90 Q510 90 520 60 Z"/>
    <path d="M720 120 Q740 95 765 112 Q790 95 810 120 Q830 130 810 148 L740 148 Q715 148 720 120 Z"/>
  </g>

  <!-- Sidebar -->
  <rect x="0" y="0" width="200" height="600" fill="#0B1B2B"/>
  <text x="24" y="45" fill="#F0F4F8" font-family="Inter, sans-serif" font-size="22" font-weight="700">Fin</text>
  <text x="24" y="90" fill="#8BAAC6" font-family="Inter, sans-serif" font-size="12" font-weight="600">MENU</text>
  <text x="24" y="120" fill="#F0F4F8" font-family="Inter, sans-serif" font-size="16">Dashboard</text>
  <text x="24" y="155" fill="#8BAAC6" font-family="Inter, sans-serif" font-size="16">Portfolio</text>
  <text x="24" y="190" fill="#8BAAC6" font-family="Inter, sans-serif" font-size="16">Analytics</text>
  <text x="24" y="225" fill="#8BAAC6" font-family="Inter, sans-serif" font-size="16">Settings</text>
  <text x="24" y="285" fill="#8BAAC6" font-family="Inter, sans-serif" font-size="12" font-weight="600">AGENTS</text>
  <text x="24" y="315" fill="#2FE0A8" font-family="Inter, sans-serif" font-size="16">Investment</text>
  <text x="24" y="350" fill="#FF6B6B" font-family="Inter, sans-serif" font-size="16">Debt</text>
  <text x="24" y="385" fill="#FFD166" font-family="Inter, sans-serif" font-size="16">Retirement</text>

  <!-- Main content area -->
  <rect x="200" y="0" width="700" height="600" fill="url(#oceanGrad)"/>

  <!-- Top bar -->
  <text x="240" y="45" fill="#0B1B2B" font-family="Inter, sans-serif" font-size="24" font-weight="600">Welcome back</text>
  <text x="760" y="45" fill="#5A7A96" font-family="Inter, sans-serif" font-size="14">Last sync: 2 min ago</text>

  <!-- Investment Agent -->
  <g transform="translate(480, 140)" class="fin">
    <!-- Badge -->
    <rect x="-70" y="-35" width="160" height="32" rx="16" fill="#FFFFFF" stroke="#2FE0A8" stroke-width="1.5" opacity="0.95"/>
    <text x="0" y="-14" fill="#0B1B2B" font-family="Inter, sans-serif" font-size="14" font-weight="600" text-anchor="middle">82% confidence</text>
    <text x="55" y="-14" fill="#5A7A96" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">ℹ</text>
    <circle cx="85" cy="-19" r="5" fill="#2FE0A8"/>

    <!-- Detailed Fin -->
    <path d="M-22 45 C-22 15 -12 -5 0 -15 C8 -8 14 5 18 25 C20 35 16 42 12 45 C8 40 4 38 0 38 C-4 38 -8 40 -12 45 C-16 42 -22 38 -22 45 Z" fill="#2FE0A8" filter="url(#glow)"/>
    <path d="M-8 25 Q0 30 8 25" fill="none" stroke="#1A9E75" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="70" fill="#0B1B2B" font-family="Inter, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Investment</text>
  </g>

  <!-- Debt Agent -->
  <g transform="translate(300, 260)" class="fin">
    <!-- Badge -->
    <rect x="-70" y="-35" width="160" height="32" rx="16" fill="#FFFFFF" stroke="#FF6B6B" stroke-width="1.5" opacity="0.95"/>
    <text x="0" y="-14" fill="#0B1B2B" font-family="Inter, sans-serif" font-size="14" font-weight="600" text-anchor="middle">67% confidence</text>
    <text x="55" y="-14" fill="#5A7A96" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">ℹ</text>
    <circle cx="85" cy="-19" r="5" fill="#FFD166"/>

    <!-- Detailed Fin -->
    <path d="M-22 45 C-22 15 -12 -5 0 -15 C8 -8 14 5 18 25 C20 35 16 42 12 45 C8 40 4 38 0 38 C-4 38 -8 40 -12 45 C-16 42 -22 38 -22 45 Z" fill="#FF6B6B" filter="url(#glow)"/>
    <path d="M-8 25 Q0 30 8 25" fill="none" stroke="#CC4A4A" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="70" fill="#0B1B2B" font-family="Inter, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Debt</text>
  </g>

  <!-- Retirement Agent -->
  <g transform="translate(640, 360)" class="fin">
    <!-- Badge -->
    <rect x="-60" y="-35" width="140" height="32" rx="16" fill="#FFFFFF" stroke="#FFD166" stroke-width="1.5" opacity="0.95"/>
    <text x="0" y="-14" fill="#0B1B2B" font-family="Inter, sans-serif" font-size="14" font-weight="600" text-anchor="middle">No data</text>
    <text x="40" y="-14" fill="#5A7A96" font-family="Inter, sans-serif" font-size="14" text-anchor="middle">ℹ</text>
    <circle cx="65" cy="-19" r="5" fill="#FF6B6B"/>

    <!-- Detailed Fin -->
    <path d="M-22 45 C-22 15 -12 -5 0 -15 C8 -8 14 5 18 25 C20 35 16 42 12 45 C8 40 4 38 0 38 C-4 38 -8 40 -12 45 C-16 42 -22 38 -22 45 Z" fill="#FFD166" filter="url(#glow)"/>
    <path d="M-8 25 Q0 30 8 25" fill="none" stroke="#CC9A3D" stroke-width="1.5" opacity="0.5"/>
    <text x="0" y="70" fill="#0B1B2B" font-family="Inter, sans-serif" font-size="16" font-weight="500" text-anchor="middle">Retirement</text>
  </g>

  <!-- Waves -->
  <g transform="translate(200,0)">
    <!-- Back wave -->
    <path class="wave-back" d="M0 520 Q70 500 140 520 T280 520 T420 520 T560 520 T700 520 V600 H0 Z" fill="#3A8CC8" opacity="0.7"/>

    <!-- Mid wave -->
    <path class="wave-mid" d="M0 540 Q80 510 160 540 T320 540 T480 540 T640 540 T700 540 V600 H0 Z" fill="url(#waveBody)" opacity="0.85"/>

    <!-- Fore wave with foam -->
    <path class="wave-fore" d="M0 560 Q90 525 180 560 T360 560 T540 560 T720 560 T900 560 V600 H0 Z" fill="#4A9FD4"/>
    <path class="foam" d="M90 545 Q110 535 130 545 Q150 555 170 545 Q150 560 130 555 Q110 560 90 545 Z" fill="#FFFFFF" opacity="0.9"/>
    <path class="foam" d="M270 545 Q290 535 310 545 Q330 555 350 545 Q330 560 310 555 Q290 560 270 545 Z" fill="#FFFFFF" opacity="0.9"/>
    <path class="foam" d="M450 545 Q470 535 490 545 Q510 555 530 545 Q510 560 490 555 Q470 560 450 545 Z" fill="#FFFFFF" opacity="0.9"/>
    <path class="foam" d="M630 545 Q650 535 670 545 Q690 555 710 545 Q690 560 670 555 Q650 560 630 545 Z" fill="#FFFFFF" opacity="0.9"/>
  </g>

  <!-- Info popup example (Investment) -->
  <g transform="translate(560, 80)">
    <rect x="0" y="0" width="220" height="110" rx="12" fill="#FFFFFF" stroke="#2FE0A8" stroke-width="1.5" opacity="0.95"/>
    <text x="16" y="30" fill="#0B1B2B" font-family="Inter, sans-serif" font-size="14" font-weight="600">Investment Agent</text>
    <text x="16" y="52" fill="#5A7A96" font-family="Inter, sans-serif" font-size="12">Last sync: 2 min ago</text>
    <text x="16" y="72" fill="#5A7A96" font-family="Inter, sans-serif" font-size="12">Data freshness: Fresh</text>
    <text x="16" y="92" fill="#5A7A96" font-family="Inter, sans-serif" font-size="12">Status: Ready to assist</text>
  </g>
</svg>
