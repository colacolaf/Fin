  <text x="755" y="329" fill="#6B7085" font-family="system-ui, sans-serif" font-size="11">MSFT</text>
  <text x="830" y="329" fill="#E8E9ED" font-family="system-ui, sans-serif" font-size="11" font-weight="500">12%</text>
  
