  <text x="740" y="518" fill="#6B7085" font-family="system-ui, sans-serif" font-size="11" font-weight="500" letter-spacing="0.1em">TOTAL RETURN</text>
  <text x="740" y="548" fill="#E8E9ED" font-family="system-ui, sans-serif" font-size="20" font-weight="700">+12.4%</text>
