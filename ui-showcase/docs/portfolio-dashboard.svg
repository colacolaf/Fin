  <circle cx="850" cy="230" r="55" fill="none" stroke="#34D399" stroke-width="22" stroke-dasharray="62 283" stroke-dashoffset="-215" transform="rotate(-90 850 230)"/>
  <circle cx="850" cy="230" r="55" fill="none" stroke="#FBBF24" stroke-width="22" stroke-dasharray="42 263" stroke-dashoffset="-277" transform="rotate(-90 850 230)"/>
