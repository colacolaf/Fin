  <text x="740" y="438" fill="#34D399" font-family="system-ui, sans-serif" font-size="20" font-weight="700">+$1,247.50</text>
  <text x="740" y="456" fill="#6B7085" font-family="system-ui, sans-serif" font-size="11">+1.01% today</text>
